version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ql_tro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ql_tro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: ql_tro_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API — dùng trong app
      - "9001:9001"   # Web Console — truy cập qua trình duyệt
    volumes:
      - minio_data:/data

  # ── Zalo Bot Server ─────────────────────────────────────────────────────────
  # Bot Zalo Web (đăng nhập cá nhân bằng QR, không cần OA).
  # Truy cập: http://localhost:3000  (admin/admin)
  # Đăng nhập lần đầu: vào Cài đặt → tab Thông báo → "Lấy QR code" rồi quét.
  # Cài đặt ql_tro: zalo_mode=bot_server, zalo_bot_server_url=http://localhost:3000
  zalo:
    image: ghcr.io/smarthomeblack/zalobot-amd64:latest
    container_name: zalo
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - /opt/zalo_bot:/app/data
      - /opt/zalo_bot/www/zalo_bot:/config/www/zalo_bot

volumes:
  postgres_data:
  minio_data:
