version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ql_tro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ql_tro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: ql_tro_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API — dùng trong app
      - "9001:9001"   # Web Console — truy cập qua trình duyệt
    volumes:
      - minio_data:/data

  # ── Zalo Bot Server ─────────────────────────────────────────────────────────
  # Bot Zalo Web (đăng nhập cá nhân bằng QR, không cần OA).
  # Truy cập: http://localhost:3000  (admin/admin)
  # Đăng nhập lần đầu: vào Cài đặt → tab Thông báo → "Lấy QR code" rồi quét.
  #
  # Thay "amd64" bằng kiến trúc máy chủ nếu cần:
  #   amd64 | aarch64 | armv7 | armhf | i386
  zalobot:
    image: ghcr.io/smarthomeblack/zalobot-amd64
    container_name: ql_tro_zalobot
    restart: unless-stopped
    # host_network cần thiết để Zalo Web protocol hoạt động ổn định.
    # App ql_tro truy cập bot qua http://localhost:3000.
    network_mode: host
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - zalobot_data:/data

volumes:
  postgres_data:
  minio_data:
  zalobot_data:
